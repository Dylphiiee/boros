name: Boros Gallery Sync

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  sync-gallery:
    name: Sync Gambar dari Discord
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install requests discord.py

      - name: Scan Discord Channel
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python scripts/discord_scan.py

      - name: Download & Proses Gambar
        run: python scripts/process_images.py

      - name: Cek Perubahan
        id: check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "Boros Gallery Bot"
          git config user.email "boros-bot@users.noreply.github.com"
          git add images/ img.json cdn_links.json
          COUNT=$(git diff --cached --name-only | grep "^images/" | wc -l)
          git commit -m "Tambah ${COUNT} gambar baru [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin main
          echo "Push berhasil!"

      - name: Tunggu 60 Detik
        run: sleep 60

      - name: Trigger Next Run
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/sync.yml/dispatches \
            -d '{"ref":"main"}'
